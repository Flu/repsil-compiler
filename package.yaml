name:                repsil
version:             0.1.0.0
github:              "Flu/repsil-compiler"
license:             BSD-3-Clause
author:              "Adrian Vasile Fluturel"
maintainer:          "fluturel.adrian@gmail.com"
copyright:           "2026 Adrian Vasile Fluturel"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/Flu/repsil-compiler#readme>

dependencies:
- base >= 4.7 && < 5
- megaparsec
- text

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  repsil-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - repsil

tests:
  repsil-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - repsil
    - hspec
    - hspec-contrib
    - hspec-megaparsec
    - megaparsec
    build-tools:
      - hspec-discover:hspec-discover
